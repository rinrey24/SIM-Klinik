services:
  postgres:
    image: postgres:16-alpine
    container_name: simklinik-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: simklinik
      POSTGRES_PASSWORD: simklinik
      POSTGRES_DB: simklinik
      TZ: Asia/Jakarta
    ports: ["15432:5432"]
    volumes:
      - simklinik-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simklinik"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: simklinik-redis
    restart: unless-stopped
    ports: ["6379:6379"]
    volumes:
      - simklinik-redis-data:/data

volumes:
  simklinik-pg-data:
  simklinik-redis-data:
